; ESP Thread BR board — application runs on ESP32-S3 host
; ESP32-H2 is RCP (OpenThread Spinel); enable full OTBR per docs/OTBR_IDF.md
[platformio]
src_dir = src
include_dir = include
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv
build_flags =
    -DTHREAD_HUB=1
    -Iinclude
    -I../shared/protocol
lib_deps =
extra_scripts =
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600

; Optional: set upload_port = /dev/cu.usbmodem* in secrets or CLI
